id: io.github.idemia.Multigit
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: multigit.sh


modules:
  - packaging/flatpak/python3-requirements-release.json

  ### Build from sources
  - name: multigit
    buildsystem: simple
    build-commands:
      - install -Dm 755 -t /app/bin/ multigit.sh
      - mkdir -p /app/multigit
      - cp -a multigit.py mgitcmd.py src/ images/ packaging /app/multigit
      - mkdir -p /app/share/metainfo
      - mkdir -p /app/share/applications
      - mkdir -p /app/share/icons/hicolor/256x256/apps
      - mkdir -p /app/share/icons/hicolor/64x64/apps
      - mkdir -p /app/share/icons/hicolor/48x48/apps
      - mkdir -p /app/share/icons/hicolor/32x32/apps
      - mkdir -p /app/share/icons/hicolor/16x16/apps
      - cp -a /app/multigit/packaging/flatpak/io.github.idemia.Multigit.metainfo.xml /app/share/metainfo
      - cp -a /app/multigit/packaging/flatpak/io.github.idemia.Multigit.desktop /app/share/applications
      - cp -a /app/multigit/images/multigit-logo-256.png /app/share/icons/hicolor/256x256/apps/io.github.idemia.Multigit.png
      - cp -a /app/multigit/images/multigit-logo-64.png /app/share/icons/hicolor/64x64/apps/io.github.idemia.Multigit.png
      - cp -a /app/multigit/images/multigit-logo-48.png /app/share/icons/hicolor/48x48/apps/io.github.idemia.Multigit.png
      - cp -a /app/multigit/images/multigit-logo-32.png /app/share/icons/hicolor/32x32/apps/io.github.idemia.Multigit.png
      - cp -a /app/multigit/images/multigit-logo-16.png /app/share/icons/hicolor/16x16/apps/io.github.idemia.Multigit.png

    sources: 
      - type: script
        dest-filename: multigit.sh
        commands:
          - exec python3 /app/multigit/multigit.py "$@"

      - type: dir
        path: .


  ### Release build        
  # - name: multigit
  #   buildsystem: simple
  #   build-commands:
  #     - pip3 install --verbose --exists-action=i --no-index --find-links=file://${PWD} --prefix=${FLATPAK_DEST} multigit_gx --no-build-isolation

  #   sources: 
  #     - type: file
  #       url: https://files.pythonhosted.org/packages/fe/c5/c96c7337a2d1242de5fade71b29494f0438def39617cf658c1b7758b6f1d/multigit_gx-1.7.1-py3-none-any.whl
  #       sha256: ada16d1ab3450b8f845719d0acbc4ad99dc69150d3d19020124f93236517bcb7
  

cleanup:
  - /lib/python3.12/site-packages/PySide6/include
  - /lib/python3.12/site-packages/PySide6/scripts
  - /lib/python3.12/site-packages/PySide6/typesystems
  - /lib/python3.12/site-packages/PySide6/assistant
  - /lib/python3.12/site-packages/PySide6/linguist
  - /lib/python3.12/site-packages/PySide6/lupdate
  - /lib/python3.12/site-packages/PySide6/qmlls
  - /lib/python3.12/site-packages/PySide6/qmlformat
  - /lib/python3.12/site-packages/PySide6/Qt/qml


finish-args:
  # Qt
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri

  # Ability to launch programs on the host
  - --talk-name=org.freedesktop.Flatpak
  - --talk-name=org.freedesktop.portal.Desktop

  # Multigit interacts with user directory: check existence of directories, of files
  # add directory when user requests it through the file dialog, removes directories
  # when they stand in the way of a clone
  - --filesystem=home
  - --filesystem=/media
  - --filesystem=/tmp  




